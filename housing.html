<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주거 안내 | Windsor Korean Life App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      padding: 24px;
      box-sizing: border-box;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #0891b2;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .section {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="./index.html">← 홈으로 돌아가기</a>

    <div class="title">주거 안내</div>
    <div class="desc">
      윈저에서 렌트, 퇴거, 긴급 주거 지원 정보를 찾을 수 있는 기본 페이지입니다.
    </div>

    <div class="section">
      <h2>먼저 확인할 것</h2>
      <ul>
        <li>현재 렌트 계약 상태 확인하기</li>
        <li>퇴거 통보서 날짜 확인하기</li>
        <li>긴급 지원 대상 여부 확인하기</li>
      </ul>
    </div>

    <div class="section">
      <h2>도움이 필요한 상황</h2>
      <ul>
        <li>월세를 감당하기 어려운 상황</li>
        <li>퇴거 경고 또는 퇴거 통보를 받은 상황</li>
        <li>단기 거주지가 급하게 필요한 상황</li>
      </ul>
    </div>

    <div class="section">
      <h2>다음 버전에 추가할 기능</h2>
      <ul>
        <li>실제 주거 지원 기관 링크</li>
        <li>신청 자격 요약</li>
        <li>전화 바로 걸기 버튼</li>
      </ul>
    </div>
  </div>
</body>
</html>
