<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지도 안내 | Windsor Korean Life App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      padding: 24px;
      box-sizing: border-box;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #0891b2;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .section {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="./index.html">← 홈으로 돌아가기</a>

    <div class="title">지도 안내</div>
    <div class="desc">
      주변 한인 마켓, 병원, 교회, 생활시설을 찾기 위한 지도 기능 페이지입니다.
    </div>

    <div class="section">
      <h2>앞으로 넣을 정보</h2>
      <ul>
        <li>한인 마켓 위치</li>
        <li>의료기관 위치</li>
        <li>정착 지원 기관 위치</li>
      </ul>
    </div>

    <div class="section">
      <h2>사용 예시</h2>
      <ul>
        <li>내 주변 병원 찾기</li>
        <li>한인 마켓까지 길찾기</li>
        <li>저장한 장소 다시 보기</li>
      </ul>
    </div>

    <div class="section">
      <h2>다음 버전에 추가할 기능</h2>
      <ul>
        <li>구글 지도 링크 연결</li>
        <li>카테고리별 필터</li>
        <li>전화/길찾기 바로가기</li>
      </ul>
    </div>
  </div>
</body>
</html>
