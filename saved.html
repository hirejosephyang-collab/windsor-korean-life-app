<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저장함 | Windsor Korean Life App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      padding: 24px;
      box-sizing: border-box;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #0891b2;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .desc {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .section {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    .section ul {
      margin: 0;
      padding-left: 18px;
      color: #334155;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="./index.html">← 홈으로 돌아가기</a>

    <div class="title">저장함</div>
    <div class="desc">
      사용자가 저장한 주거, 의료, 지도 정보를 다시 보는 공간입니다.
    </div>

    <div class="section">
      <h2>현재 상태</h2>
      <ul>
        <li>아직 저장된 항목이 없습니다</li>
        <li>향후 북마크 기능이 연결될 예정입니다</li>
      </ul>
    </div>

    <div class="section">
      <h2>다음 버전에 추가할 기능</h2>
      <ul>
        <li>저장한 병원 목록</li>
        <li>저장한 주거 지원 정보</li>
        <li>저장한 장소 다시 열기</li>
      </ul>
    </div>
  </div>
</body>
</html>
